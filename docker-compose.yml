version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: heven
      POSTGRES_PASSWORD: heven
      POSTGRES_DB: heven_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  postgres_data:
